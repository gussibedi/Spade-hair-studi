<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spade Hair Studio — Elite+</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script><style>
:root{
--black:#050505;
--gold:#C9A84C;
--white:#F5F0E8;
--muted:rgba(255,255,255,0.6);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'DM Sans',sans-serif;
background:var(--black);
color:var(--white);
overflow-x:hidden;
}

/* CURSOR */
.cursor{
width:20px;height:20px;
border:1px solid var(--gold);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
transition:transform .15s ease;
}
.cursor.active{transform:translate(-50%,-50%) scale(2)}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
padding:20px 60px;
backdrop-filter:blur(15px);
background:rgba(0,0,0,0.4);
z-index:1000;
}
nav h1{font-family:'Bebas Neue';letter-spacing:3px}
nav a{color:var(--muted);margin-left:25px;text-decoration:none;font-size:13px}
nav a:hover{color:var(--gold)}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}
.hero video{
position:absolute;width:100%;height:100%;object-fit:cover;opacity:0.3;
}
.hero h1{
font-family:'Bebas Neue';
font-size:130px;
letter-spacing:4px;
position:relative;
}
.hero span{color:var(--gold)}
.hero p{margin-top:20px;color:var(--muted);font-style:italic}

/* SECTION */
.section{padding:140px 60px;max-width:1300px;margin:auto}

/* ABOUT */
.about{display:grid;grid-template-columns:1fr 1fr;gap:80px}
.about img{width:100%;height:520px;object-fit:cover}

/* GALLERY */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,300px);gap:8px}
.gallery div{position:relative;overflow:hidden}
.gallery div:first-child{grid-row:span 2}
.gallery img{width:100%;height:100%;object-fit:cover;transition:1s}
.gallery div:hover img{transform:scale(1.12)}
.label{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.6);padding:8px 12px;font-size:12px;letter-spacing:2px;color:var(--gold)}

/* CTA */
.cta{text-align:center;padding:160px 20px}
.cta h2{font-family:'Bebas Neue';font-size:100px}
.cta button{
margin-top:40px;
padding:22px 60px;
border:1px solid var(--gold);
background:none;
color:var(--gold);
cursor:pointer;
letter-spacing:3px;
position:relative;
overflow:hidden;
}
.cta button::before{
content:'';
position:absolute;
inset:0;
background:var(--gold);
transform:scaleX(0);
transform-origin:left;
transition:.4s;
z-index:-1;
}
.cta button:hover::before{transform:scaleX(1)}
.cta button:hover{color:black}

footer{text-align:center;padding:40px;color:var(--muted)}

@media(max-width:768px){
.about{grid-template-columns:1fr}
.hero h1{font-size:70px}
}
</style></head><body><div class="cursor" id="cursor"></div><nav>
<h1>SPADE</h1>
<div>
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
<a href="#book">Book</a>
</div>
</nav><!-- HERO --><div class="hero">
<video autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>
<div>
<h1>SPADE <span>STUDIO</span></h1>
<p>Precision. Luxury. Experience.</p>
</div>
</div><!-- ABOUT --><div class="section about">
<img src="beard.jpg">
<div>
<h2 style="font-family:Bebas Neue;font-size:70px">Elite Craft</h2>
<p style="margin-top:20px;color:var(--muted)">
Designed for those who expect perfection.
</p>
</div>
</div><!-- GALLERY --><div class="section" id="gallery">
<h2 style="font-family:Bebas Neue;font-size:70px;margin-bottom:50px">Gallery</h2>
<div class="gallery">
<div><img src="beard.jpg"><div class="label">Signature</div></div>
<div><img src="shop1.jpg"><div class="label">Studio</div></div>
<div><img src="shop2.jpg"><div class="label">Workspace</div></div>
<div><img src="shop3.jpg"><div class="label">Interior</div></div>
<div><img src="shop2.jpg"><div class="label">Chairs</div></div>
</div>
</div><!-- BOOKING --><div class="cta" id="book">
<h2>Book Your Cut</h2>
<a href="https://calendly.com" target="_blank">
<button>Reserve Now</button>
</a>
</div><footer>© Spade Studio</footer><script>
// CURSOR
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

document.querySelectorAll('a,button').forEach(el=>{
el.addEventListener('mouseenter',()=>cursor.classList.add('active'));
el.addEventListener('mouseleave',()=>cursor.classList.remove('active'));
});

// GSAP
gsap.registerPlugin(ScrollTrigger);

gsap.from('.hero h1',{y:100,opacity:0,duration:1.2});

gsap.utils.toArray('.section').forEach(sec=>{
gsap.from(sec,{scrollTrigger:{trigger:sec,start:'top 80%'},y:120,opacity:0,duration:1});
});

// PAGE FADE IN
gsap.from('body',{opacity:0,duration:1});
</script></body>
</html>
